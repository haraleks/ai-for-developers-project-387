name: opencode-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  opencode-review:
    # Включаем проверку так, чтобы бот реагировал на код человека и бота
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # Нужен для аутентификации через GitHub Actions
      contents: read       # Достаточно для чтения кода и diff
      pull-requests: write  # Достаточно для чтения данных PR
      issues: write        # Нужно, чтобы оставлять комментарии в PR
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Run OpenCode review
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          use_github_token: true # Добавлено: принудительно отключаем внешнего бота
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: opencode/deepseek-v4-flash-free
          prompt: |
            Review this pull request:
            - Find bugs and risky changes
            - Check readability and maintainability
            - Leave actionable review comments