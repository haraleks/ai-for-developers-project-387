name: Weekly Code Audit
on:
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 9am UTC
jobs:
  opencode:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/deepseek-v4-flash-free
          prompt: |
            Review all open issues and PRs. Find items with no activity
            in the last 90 days. For each stale item:
            - Leave a comment asking if it's still relevant
            - If it looks abandoned, suggest closing with explanation
            Skip issues labeled "long-term" or "roadmap".